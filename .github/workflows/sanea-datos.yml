name: Sanear datos de la quiniela

# Los cruces y marcadores oficiales viven en partidos.json (solo los edita el organizador).
# Si un guardado desde la página (o una versión vieja en caché) mete otros cruces o
# marcadores en datos.json, este robot los corrige al instante.
on:
  push:
    branches: [main]
    paths: ["datos.json", "partidos.json", "bloqueados.json"]

jobs:
  sanear:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Forzar cruces y marcadores oficiales
        run: |
          python3 - <<'EOF'
          import json, os
          datos = json.load(open('datos.json', encoding='utf-8'))
          antes = json.dumps(datos, sort_keys=True)
          datos['matches'] = json.load(open('partidos.json', encoding='utf-8'))
          # jugadores congelados: sus datos y pronósticos siempre vuelven a lo oficial
          if os.path.exists('bloqueados.json'):
              bloq = json.load(open('bloqueados.json', encoding='utf-8'))
              vivos = {p['id']: p for p in datos['players']}
              for pid, pdata in bloq['players'].items():
                  if pid in vivos:
                      vivos[pid].update(pdata)
                  else:
                      datos['players'].append({'id': pid, **pdata})
              # partido por partido: restaura los picks congelados (octavos) sin
              # borrar los pronósticos nuevos de fases abiertas (cuartos, etc.)
              picks = datos.setdefault('picks', {})
              for pid, pk in bloq['picks'].items():
                  picks.setdefault(pid, {}).update(pk)
          if json.dumps(datos, sort_keys=True) != antes:
              json.dump(datos, open('datos.json', 'w', encoding='utf-8'), ensure_ascii=False, indent=2)
              print('datos.json corregido (partidos oficiales y jugadores congelados)')
          else:
              print('datos.json ya está en orden')
          EOF
      - name: Subir corrección si hubo cambios
        run: |
          if ! git diff --quiet; then
            git config user.name "quiniela-bot"
            git config user.email "actions@users.noreply.github.com"
            git add datos.json
            git commit -m "Robot: restaura los cruces y marcadores oficiales"
            git pull --rebase
            git push
          fi
